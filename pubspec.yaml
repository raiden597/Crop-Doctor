name: Sasya_AI
description: AI-powered crop disease detection for Indian farmers
publish_to: 'none'
version: 1.0.5+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  image_picker: ^1.0.7
  http: ^1.2.0

  # Storage & State
  shared_preferences: ^2.2.2

  # UI
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6

  # Image handling
  image: ^4.1.7

  # Sharing
  share_plus: ^10.0.0

  # Text-to-speech
  flutter_tts: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#0D3320"
  adaptive_icon_foreground: "assets/images/app_icon.png"
